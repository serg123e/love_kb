name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build data/pages.json from wiki/
        run: python3 build_site.py --check

      - name: Assemble static site
        run: |
          mkdir -p _site/wiki
          cp -r index.html assets data .nojekyll _site/
          # картинки PDF-источников (wiki/assets) публикуем по тем же путям, что в md
          if [ -d wiki/assets ]; then cp -r wiki/assets _site/wiki/assets; fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
